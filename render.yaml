services:
  - type: web
    name: citypulse-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: citypulse-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: citypulse-backend
          type: web
          property: host
